name = "gamevault-biglybt"
main = "worker.js"
compatibility_date = "2024-11-01"

# Non-secret vars. BIGLY_URL is set as a SECRET instead (see README) so your
# server address stays out of the repo. RPC_PATH only needs changing if your
# Web Remote plugin uses a non-default RPC path.
[vars]
ALLOW_ORIGIN = "https://sinuksml.github.io"
RPC_PATH = "/transmission/rpc"
